name: Deploy to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook deploy
        run: |
          RESPONSE=$(curl -s -o /tmp/deploy_response.json -w "%{http_code}" \
            -X POST \
            "https://ppj.jurnalsinta.id/webhook_deploy.php" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/deploy_response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Deploy failed with HTTP $RESPONSE"
            exit 1
          fi
