name: Deploy to cPanel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git Deploy
        run: |
          RESPONSE=$(curl -s -o /tmp/cpanel_response.json -w "%{http_code}" \
            -X POST \
            "https://ppj.jurnalsinta.id:2083/execute/VersionControlDeployment/deploy" \
            -H "Authorization: cpanel jurz2196:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=/home/jurz2196/repo/simonju")
          echo "HTTP Status: $RESPONSE"
          cat /tmp/cpanel_response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "Deploy failed with HTTP $RESPONSE"
            exit 1
          fi
